services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: elimu
      POSTGRES_USER: elimu
      POSTGRES_PASSWORD: elimu
    ports:
      - "55432:5432"
    volumes:
      - elimu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elimu -d elimu"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  elimu_postgres_data:
